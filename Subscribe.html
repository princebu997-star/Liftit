<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiftIt - Subscribe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100">

<!-- Navigation -->
<nav class="bg-white shadow-lg p-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center">
            <i class="fas fa-dumbbell text-2xl text-blue-600 mr-2"></i>
            <span class="text-xl font-bold">LiftIt</span>
        </div>
        <a href="index.html" class="text-blue-600 hover:underline">← Back to Home</a>
    </div>
</nav>

<!-- Payment Section -->
<div class="max-w-4xl mx-auto p-6">
    <div class="bg-white rounded-2xl shadow-xl p-8">
        <h1 class="text-3xl font-bold text-center mb-8">Complete Your Subscription</h1>
        
        <!-- Plan Details -->
        <div class="bg-blue-50 p-6 rounded-xl mb-6" id="planDetails">
            <!-- Dynamic content -->
        </div>
        
        <!-- Payment Options -->
        <h3 class="text-xl font-bold mb-4">Choose Payment Method</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <!-- UPI -->
            <div class="border-2 rounded-xl p-4 text-center hover:border-blue-600 cursor-pointer payment-method" onclick="selectPayment('upi', this)">
                <i class="fas fa-mobile-alt text-3xl text-green-600 mb-2"></i>
                <p class="font-bold">UPI</p>
                <p class="text-xs text-gray-500">Google Pay, PhonePe, Paytm</p>
            </div>
            
            <!-- Card -->
            <div class="border-2 rounded-xl p-4 text-center hover:border-blue-600 cursor-pointer payment-method" onclick="selectPayment('card', this)">
                <i class="fas fa-credit-card text-3xl text-blue-600 mb-2"></i>
                <p class="font-bold">Card</p>
                <p class="text-xs text-gray-500">Visa, Mastercard, RuPay</p>
            </div>
            
            <!-- Net Banking -->
            <div class="border-2 rounded-xl p-4 text-center hover:border-blue-600 cursor-pointer payment-method" onclick="selectPayment('netbanking', this)">
                <i class="fas fa-university text-3xl text-purple-600 mb-2"></i>
                <p class="font-bold">Net Banking</p>
                <p class="text-xs text-gray-500">All Indian Banks</p>
            </div>
        </div>
        
        <!-- UPI Apps (Show when UPI selected) -->
        <div id="upiApps" class="hidden mb-6">
            <p class="font-semibold mb-2">Select UPI App:</p>
            <div class="flex flex-wrap gap-2">
                <button class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200">Google Pay</button>
                <button class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200">PhonePe</button>
                <button class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200">Paytm</button>
                <button class="px-4 py-2 bg-gray-100 rounded-lg hover:bg-gray-200">BHIM</button>
            </div>
        </div>
        
        <!-- Payment Button -->
        <button onclick="processPayment()" class="w-full bg-gradient-to-r from-green-600 to-green-700 text-white py-4 rounded-xl font-bold text-lg hover:shadow-xl">
            <i class="fas fa-lock mr-2"></i>Pay Now
        </button>
        
        <!-- Security Badges -->
        <div class="flex justify-center space-x-4 mt-4">
            <i class="fas fa-lock text-green-600"></i>
            <span class="text-xs text-gray-500">256-bit Secure</span>
            <i class="fas fa-shield-alt text-green-600"></i>
            <span class="text-xs text-gray-500">Razorpay Trust</span>
        </div>
    </div>
</div>

<script>
    // Get plan from URL
    const urlParams = new URLSearchParams(window.location.search);
    const plan = urlParams.get('plan') || 'monthly';
    const amount = urlParams.get('amount') || '249';
    
    // Show plan details
    const planDetails = document.getElementById('planDetails');
    let planName = plan === 'monthly' ? 'Monthly' : plan === '6months' ? '6 Months' : 'Yearly';
    planDetails.innerHTML = `
        <div class="flex justify-between items-center">
            <div>
                <p class="text-gray-600">Selected Plan:</p>
                <p class="text-2xl font-bold">${planName}</p>
            </div>
            <div class="text-right">
                <p class="text-gray-600">Amount:</p>
                <p class="text-3xl font-bold text-blue-600">₹${amount}</p>
            </div>
        </div>
    `;
    
    let selectedMethod = '';
    
    function selectPayment(method, element) {
        selectedMethod = method;
        
        // Remove highlight from all
        document.querySelectorAll('.payment-method').forEach(el => {
            el.classList.remove('border-blue-600', 'bg-blue-50');
        });
        
        // Highlight selected
        element.classList.add('border-blue-600', 'bg-blue-50');
        
        // Show UPI apps if UPI selected
        document.getElementById('upiApps').style.display = method === 'upi' ? 'block' : 'none';
    }
    
    function processPayment() {
        if(!selectedMethod) {
            alert('Please select a payment method');
            return;
        }
        
        alert(`✅ Payment Successful!\n\nPlan: ${planName}\nAmount: ₹${amount}\nMethod: ${selectedMethod}\n\nRedirecting to dashboard...`);
        
        // Redirect to owner dashboard
        setTimeout(() => {
            window.location.href = 'owner-dashboard.html';
        }, 2000);
    }
</script>

</body>
</html>
