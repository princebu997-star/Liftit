<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiftIt - Owner Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <nav class="bg-gradient-to-r from-blue-600 to-purple-600 text-white p-4">
        <div class="max-w-7xl mx-auto flex justify-between">
            <div class="flex items-center">
                <i class="fas fa-store text-2xl mr-2"></i>
                <span class="text-xl font-bold">Owner Dashboard</span>
            </div>
            <button onclick="window.location.href='login.html'" class="bg-white text-blue-600 px-4 py-2 rounded-lg">Logout</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6">
        <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl shadow">
                <p class="text-gray-500">Total Members</p>
                <p class="text-2xl font-bold">156</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow">
                <p class="text-gray-500">Active Now</p>
                <p class="text-2xl font-bold">45</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow">
                <p class="text-gray-500">Revenue</p>
                <p class="text-2xl font-bold">₹38,844</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow">
                <p class="text-gray-500">Pending</p>
                <p class="text-2xl font-bold text-red-600">₹4,500</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow p-6">
            <h3 class="text-xl font-bold mb-4">Members List</h3>
            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr><th class="p-3">Name</th><th>Mobile</th><th>Plan</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody>
                    <tr class="border-b">
                        <td class="p-3">Rahul Sharma</td><td>9876543210</td><td>Monthly</td><td><span class="bg-green-100 text-green-600 px-2 py-1 rounded">Paid</span></td>
                        <td><button class="text-blue-600">View</button></td>
                    </tr>
                    <tr class="border-b">
                        <td class="p-3">Priya Patel</td><td>9876543211</td><td>Quarterly</td><td><span class="bg-red-100 text-red-600 px-2 py-1 rounded">Due</span></td>
                        <td><button class="text-blue-600">View</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
