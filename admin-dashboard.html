<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiftIt - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <nav class="bg-gradient-to-r from-gray-900 to-gray-800 text-white p-4">
        <div class="max-w-7xl mx-auto flex justify-between">
            <div class="flex items-center">
                <i class="fas fa-crown text-2xl text-yellow-400 mr-2"></i>
                <span class="text-xl font-bold">LiftIt Admin</span>
            </div>
            <button onclick="window.location.href='login.html'" class="bg-red-500 px-4 py-2 rounded-lg">Logout</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6">
        <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl shadow">
                <p class="text-gray-500">Total Owners</p>
                <p class="text-2xl font-bold">156</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow">
                <p class="text-gray-500">Total Members</p>
                <p class="text-2xl font-bold">3,847</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow">
                <p class="text-gray-500">Revenue</p>
                <p class="text-2xl font-bold">₹12,45,678</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow">
                <p class="text-gray-500">Active Now</p>
                <p class="text-2xl font-bold">342</p>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow p-6">
            <h3 class="text-xl font-bold mb-4">All Owners</h3>
            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr><th class="p-3">Owner</th><th>Business</th><th>Members</th><th>Revenue</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody>
                    <tr class="border-b">
                        <td class="p-3">Rahul Sharma</td><td>Fitness Hub Gym</td><td>156</td><td>₹38,844</td><td><span class="bg-green-100 text-green-600 px-2 py-1 rounded">Active</span></td>
                        <td><button class="text-blue-600"><i class="fas fa-eye"></i></button></td>
                    </tr>
                    <tr class="border-b">
                        <td class="p-3">Priya Patel</td><td>City Library</td><td>234</td><td>₹58,266</td><td><span class="bg-green-100 text-green-600 px-2 py-1 rounded">Active</span></td>
                        <td><button class="text-blue-600"><i class="fas fa-eye"></i></button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
